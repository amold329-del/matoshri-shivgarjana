# Builds the static site and publishes it to GitHub Pages on every push to main.
# No manual steps needed once Pages is enabled (Settings → Pages → Source: GitHub Actions).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # lets you trigger a deploy manually from the Actions tab

# Permissions required by the official Pages deploy action.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Detects whether this is a user/org site (<user>.github.io → no prefix)
      # or a project site (<user>.github.io/<repo> → "/<repo>" prefix) and
      # exposes the correct value as steps.pages.outputs.base_path.
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        env:
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build

      # Safety net: ensures GitHub never runs Jekyll over the _next/ assets.
      - name: Disable Jekyll
        run: touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
